services:
  - type: web
    name: weather-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api_server:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
  
  - type: web
    name: weather-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0
    envVars:
      - key: API_URL
        value: https://weather-api.onrender.com/latest