services:
  - type: web
    name: weather-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
  
  - type: web
    name: weather-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0
    envVars:
      - key: API_URL
        value: https://weather-api.onrender.com/latest
      - key: PYTHONUNBUFFERED
        value: "1"